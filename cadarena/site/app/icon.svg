<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- website background color -->
  <rect width="32" height="32" rx="4" fill="#4a80b4"/>
  <!-- grid lines matching the site's blueprint-bg pattern -->
  <line x1="0" y1="8" x2="32" y2="8" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="0" y1="16" x2="32" y2="16" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="0" y1="24" x2="32" y2="24" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="8" y1="0" x2="8" y2="32" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="16" y1="0" x2="16" y2="32" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="24" y1="0" x2="24" y2="32" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- isometric cube — top face brightest, sides darker -->
  <!-- top face: (16,4) (25,9) (16,14) (7,9) -->
  <polygon points="16,4 25,9 16,14 7,9" fill="rgba(255,255,255,0.28)" stroke="rgba(255,255,255,0.92)" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- left face: (7,9) (16,14) (16,24) (7,19) -->
  <polygon points="7,9 16,14 16,24 7,19" fill="rgba(255,255,255,0.13)" stroke="rgba(255,255,255,0.92)" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- right face: (25,9) (16,14) (16,24) (25,19) -->
  <polygon points="25,9 16,14 16,24 25,19" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.92)" stroke-width="1.2" stroke-linejoin="round"/>
</svg>
