<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lego Technic Assembly Studio</title>
<script defer src="/_vercel/insights/script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/LDrawLoader.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

  header {
    background: #16213e;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid #0f3460;
    flex-shrink: 0;
  }
  header h1 { font-size: 18px; color: #e94560; letter-spacing: 1px; }
  header span { color: #888; font-size: 13px; }

  /* Gallery strip */
  .gallery-strip {
    background: #0f1f3d;
    border-bottom: 1px solid #0f3460;
    padding: 8px 16px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .gallery-strip::-webkit-scrollbar { height: 4px; }
  .gallery-strip::-webkit-scrollbar-thumb { background: #1a4a80; border-radius: 2px; }

  .gallery-card {
    background: #16213e;
    border: 1px solid #1a4a80;
    border-radius: 6px;
    padding: 8px 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 150px;
  }
  .gallery-card:hover { background: #1a4a80; border-color: #7eb8e8; }
  .gallery-card.active { background: #1a3a60; border-color: #e94560; }
  .gallery-card-title { font-size: 13px; font-weight: bold; color: #e0e0e0; }
  .gallery-card-sub { font-size: 11px; color: #888; }
  .gallery-card-tag {
    font-size: 10px; padding: 1px 5px; border-radius: 3px;
    display: inline-block; margin-top: 2px;
  }
  .tag-gear    { background: #3a2a00; color: #d4a843; }
  .tag-linear  { background: #2a1a3a; color: #e87722; }
  .tag-compound{ background: #1a2a3a; color: #7eb8e8; }
  .tag-worm    { background: #1a3a1a; color: #4caf50; }
  .tag-speed   { background: #3a1a1a; color: #e94560; }

  .main { display: flex; flex: 1; overflow: hidden; }

  /* Left panel - parts browser */
  .parts-panel {
    width: 260px;
    background: #16213e;
    border-right: 1px solid #0f3460;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .parts-panel h2 { padding: 12px 14px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: #888; border-bottom: 1px solid #0f3460; }
  .parts-search { padding: 10px; border-bottom: 1px solid #0f3460; }
  .parts-search input {
    width: 100%; padding: 7px 10px; background: #0f3460;
    border: 1px solid #1a4a80; border-radius: 4px; color: #e0e0e0; font-size: 13px;
  }
  .parts-search input:focus { outline: none; border-color: #e94560; }
  .cat-filters { display: flex; flex-wrap: wrap; gap: 4px; padding: 8px 10px; border-bottom: 1px solid #0f3460; }
  .cat-btn {
    padding: 3px 8px; border-radius: 3px; font-size: 11px; cursor: pointer; border: none;
    background: #0f3460; color: #aaa;
    transition: all 0.15s;
  }
  .cat-btn.active { background: #e94560; color: white; }
  .parts-list { flex: 1; overflow-y: auto; }
  .part-item {
    padding: 8px 14px; cursor: pointer; border-bottom: 1px solid #0a2040;
    transition: background 0.1s;
  }
  .part-item:hover { background: #0f3460; }
  .part-item.selected { background: #1a4a80; }
  .part-id { font-size: 13px; font-weight: bold; color: #7eb8e8; }
  .part-name { font-size: 11px; color: #888; margin-top: 2px; }
  .part-spec { font-size: 11px; color: #e94560; margin-top: 1px; }

  /* Part detail popup */
  .part-detail {
    background: #0f3460; border-top: 1px solid #1a4a80;
    padding: 12px 14px; font-size: 12px; display: none;
  }
  .part-detail.visible { display: block; }
  .part-detail h3 { color: #7eb8e8; margin-bottom: 8px; font-size: 13px; }
  .detail-row { display: flex; justify-content: space-between; padding: 2px 0; }
  .detail-key { color: #888; }
  .detail-val { color: #e0e0e0; }

  /* Center - 3D viewer */
  .viewer { flex: 1; position: relative; }
  #canvas { width: 100%; height: 100%; display: block; }
  .viewer-controls {
    position: absolute; top: 10px; right: 10px;
    display: flex; gap: 6px;
  }
  .viewer-controls button {
    padding: 6px 12px; background: #16213e; border: 1px solid #0f3460;
    color: #aaa; border-radius: 4px; cursor: pointer; font-size: 12px;
    transition: all 0.15s;
  }
  .viewer-controls button:hover { background: #0f3460; color: white; }

  /* Right panel - editor */
  .editor-panel {
    width: 380px;
    background: #16213e;
    border-left: 1px solid #0f3460;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .editor-tabs {
    display: flex; border-bottom: 1px solid #0f3460;
  }
  .tab-btn {
    flex: 1; padding: 10px; font-size: 12px; text-align: center;
    cursor: pointer; color: #888; background: none; border: none;
    border-bottom: 2px solid transparent; transition: all 0.15s;
  }
  .tab-btn.active { color: #7eb8e8; border-bottom-color: #7eb8e8; }

  .tab-content { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .tab-content.active { display: flex; }

  #assembly-editor {
    flex: 1; padding: 10px; background: #0a1628; color: #c8e6c9;
    font-family: 'Fira Code', 'Courier New', monospace; font-size: 12px;
    border: none; resize: none; outline: none; line-height: 1.5;
  }
  .editor-actions {
    padding: 10px; display: flex; gap: 8px; border-top: 1px solid #0f3460;
  }
  .btn-compile {
    flex: 1; padding: 9px; background: #e94560; border: none; color: white;
    border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold;
    transition: background 0.15s;
  }
  .btn-compile:hover { background: #c73652; }
  .btn-clear {
    padding: 9px 14px; background: #0f3460; border: 1px solid #1a4a80;
    color: #aaa; border-radius: 4px; cursor: pointer; font-size: 13px;
  }

  /* Results */
  #results { flex: 1; overflow-y: auto; padding: 12px; }
  .result-section { margin-bottom: 14px; }
  .result-section h3 { font-size: 12px; text-transform: uppercase; color: #888; letter-spacing: 1px; margin-bottom: 8px; }
  .stat-grid { display: flex; gap: 8px; margin-bottom: 4px; }
  .stat-box { flex: 1; background: #0a2040; border: 1px solid #1e3a5f; border-radius: 6px; padding: 8px; text-align: center; }
  .stat-val { font-size: 20px; font-weight: bold; color: #e94560; }
  .stat-label { font-size: 10px; color: #888; text-transform: uppercase; margin-top: 2px; }
  .check-item {
    padding: 6px 10px; border-radius: 4px; font-size: 12px;
    margin-bottom: 4px; display: flex; align-items: flex-start; gap: 8px;
  }
  .check-ok { background: #1a3a1a; border-left: 3px solid #4caf50; }
  .check-err { background: #3a1a1a; border-left: 3px solid #e94560; }
  .check-warn { background: #3a2a1a; border-left: 3px solid #ff9800; }
  .check-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .check-msg { flex: 1; color: #ccc; line-height: 1.4; }
  .check-fix { font-size: 11px; color: #ff9800; margin-top: 3px; }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .stat-box {
    background: #0f3460; border-radius: 4px; padding: 8px;
    text-align: center;
  }
  .stat-val { font-size: 22px; font-weight: bold; color: #7eb8e8; }
  .stat-label { font-size: 11px; color: #888; margin-top: 2px; }
  .stat-box.highlight .stat-val { color: #e94560; }

  /* Tasks panel */
  .tasks-list { overflow-y: auto; }
  .task-item {
    padding: 10px 14px; border-bottom: 1px solid #0a2040; cursor: pointer;
    transition: background 0.1s;
  }
  .task-item:hover { background: #0f3460; }
  .task-header { display: flex; align-items: center; gap: 8px; }
  .task-id { font-size: 11px; background: #e94560; color: white; padding: 2px 6px; border-radius: 3px; }
  .task-name { font-size: 13px; }
  .task-prompt { font-size: 11px; color: #888; margin-top: 4px; line-height: 1.4; }

  .tier-label {
    padding: 6px 14px; font-size: 11px; text-transform: uppercase;
    letter-spacing: 1px; color: #e94560; background: #0a1628;
    border-bottom: 1px solid #0f3460;
  }

  /* Prompt bar */
  .prompt-bar {
    background: #0f1f3d; border-bottom: 2px solid #e94560;
    padding: 10px 16px; display: flex; gap: 10px; align-items: center; flex-shrink: 0;
  }
  .prompt-bar input {
    flex: 1; padding: 9px 14px; background: #16213e;
    border: 1px solid #1a4a80; border-radius: 6px; color: #e0e0e0;
    font-size: 14px; outline: none; transition: border-color 0.15s;
  }
  .prompt-bar input:focus { border-color: #e94560; }
  .prompt-bar input::placeholder { color: #445; }
  .btn-generate {
    padding: 9px 20px; background: #e94560; border: none; color: white;
    border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold;
    white-space: nowrap; transition: background 0.15s;
  }
  .btn-generate:hover { background: #c73652; }
  .btn-generate:disabled { background: #444; cursor: not-allowed; }

  /* Agent log */
  .agent-log { padding: 10px; }
  .agent-entry {
    padding: 6px 10px; border-radius: 4px; font-size: 12px;
    margin-bottom: 5px; line-height: 1.4; border-left: 3px solid transparent;
  }
  .agent-thinking { background: #0a1628; border-color: #1a4a80; color: #99b; font-style: italic; white-space: pre-wrap; word-break: break-word; max-height: 120px; overflow-y: auto; }
  .agent-tool { background: #1a2a3a; border-color: #7eb8e8; color: #7eb8e8; }
  .agent-valid { background: #1a3a1a; border-color: #4caf50; color: #4caf50; }
  .agent-error-entry { background: #3a1a1a; border-color: #e94560; color: #e94560; }
  .agent-done { background: #1a3a2a; border-color: #4caf50; color: #e0e0e0; font-weight: bold; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; animation: spin 1s linear infinite; }

  /* ── Page nav ── */
  .page-nav { display: flex; gap: 0; margin-left: 24px; }
  .page-nav-btn {
    padding: 6px 18px; background: none; border: none; color: #888;
    font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .page-nav-btn.active { color: #e94560; border-bottom-color: #e94560; }
  .page-nav-btn:hover:not(.active) { color: #aaa; }

  /* ── Page containers ── */
  #page-studio { display: flex; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }
  #page-library { display: none; flex: 1; min-height: 0; overflow: hidden; }

  /* ── Library layout ── */
  .lib-layout { display: flex; width: 100%; height: 100%; overflow: hidden; }
  .lib-sidebar {
    width: 280px; background: #16213e; border-right: 1px solid #0f3460;
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  }
  .lib-sidebar-header { padding: 10px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #888; border-bottom: 1px solid #0f3460; }
  .lib-search { padding: 8px 10px; border-bottom: 1px solid #0f3460; }
  .lib-search input {
    width: 100%; padding: 6px 10px; background: #0f3460;
    border: 1px solid #1a4a80; border-radius: 4px; color: #e0e0e0; font-size: 13px;
  }
  .lib-search input:focus { outline: none; border-color: #e94560; }
  .lib-grid { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
  .lib-cat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #e94560; padding: 8px 6px 4px; }
  .lib-card {
    padding: 8px 12px; background: #0f3460; border: 1px solid #1a4a80;
    border-radius: 5px; cursor: pointer; transition: all 0.1s;
  }
  .lib-card:hover { background: #1a4a80; }
  .lib-card.active { border-color: #e94560; background: #1a2a40; }
  .lib-card-name { font-size: 13px; font-weight: bold; color: #7eb8e8; }
  .lib-card-meta { font-size: 11px; color: #888; margin-top: 2px; }
  .lib-card-spec { font-size: 11px; color: #d4a843; }

  /* ── Library right side ── */
  .lib-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .lib-viewer { flex: 1; position: relative; }
  #lib-canvas { width: 100%; height: 100%; display: block; }
  .lib-viewer-hint { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); color: #555; font-size: 12px; pointer-events: none; }
  .lib-detail {
    padding: 14px 18px; background: #16213e; border-top: 1px solid #0f3460;
    max-height: 180px; overflow-y: auto;
  }
  .lib-detail h3 { font-size: 15px; color: #7eb8e8; margin-bottom: 10px; }
  .lib-detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
  .lib-spec-box { background: #0f3460; border-radius: 4px; padding: 8px 10px; }
  .lib-spec-key { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .lib-spec-val { font-size: 14px; font-weight: bold; color: #e0e0e0; margin-top: 2px; }
  .lib-empty { color: #555; font-size: 13px; padding: 40px; text-align: center; }
</style>
</head>
<body>

<header>
  <h1>🧱 Lego Technic Studio</h1>
  <span>Place parts · Verify connections · Visualize in 3D</span>
  <nav class="page-nav">
    <button class="page-nav-btn active" id="nav-studio" onclick="switchPage('studio')">Studio</button>
    <button class="page-nav-btn" id="nav-library" onclick="switchPage('library')">Library</button>
  </nav>
</header>

<div id="page-studio">
<div class="prompt-bar">
  <input type="text" id="prompt-input" placeholder="Describe a mechanism... e.g. 'build a 3:1 gear reduction'" onkeydown="if(event.key==='Enter')generateAssembly()">
  <button class="btn-generate" id="btn-generate" onclick="generateAssembly()">Generate ✦</button>
</div>

<div class="gallery-strip" id="gallery-strip"></div>

<div class="main">

  <!-- ── Left: parts browser ── -->
  <div class="parts-panel">
    <h2>Parts Library</h2>
    <div class="parts-search">
      <input type="text" id="part-search" placeholder="Search parts..." oninput="searchParts()">
    </div>
    <div class="cat-filters" id="cat-filters"></div>
    <div class="parts-list" id="parts-list"></div>
    <div class="part-detail" id="part-detail"></div>
  </div>

  <!-- ── Center: 3D viewer ── -->
  <div class="viewer">
    <canvas id="canvas"></canvas>
    <div class="viewer-controls">
      <button onclick="resetCamera()">Reset View</button>
      <button onclick="toggleAxes()">Axes</button>
      <button id="btn-play" onclick="togglePlay()" style="background:#1a3a1a;color:#4caf50;border-color:#4caf50">▶ Play</button>
    </div>
  </div>

  <!-- ── Right: editor + results ── -->
  <div class="editor-panel">
    <div class="editor-tabs">
      <button class="tab-btn active" onclick="switchTab('editor')">Assembly JSON</button>
      <button class="tab-btn" onclick="switchTab('results')">Results</button>
      <button class="tab-btn" onclick="switchTab('tasks')">Tasks</button>
    </div>

    <div class="tab-content active" id="tab-editor">
      <textarea id="assembly-editor" spellcheck="false"></textarea>
      <div class="editor-actions">
        <button class="btn-compile" onclick="compileAssembly()">▶ Compile & Visualize</button>
        <button class="btn-clear" onclick="clearEditor()">Clear</button>
      </div>
    </div>

    <div class="tab-content" id="tab-results">
      <div id="results"><p style="color:#888;padding:20px;text-align:center">Compile an assembly to see results.</p></div>
    </div>

    <div class="tab-content" id="tab-tasks">
      <div class="tasks-list" id="tasks-list"></div>
    </div>
  </div>

</div>
</div><!-- #page-studio -->

<div id="page-library">
  <div class="lib-layout">
    <div class="lib-sidebar">
      <div class="lib-sidebar-header">Parts Library</div>
      <div class="lib-search"><input type="text" id="lib-search-input" placeholder="Search parts..." oninput="filterLibrary()"></div>
      <div class="lib-grid" id="lib-grid"></div>
    </div>
    <div class="lib-main">
      <div class="lib-viewer">
        <canvas id="lib-canvas"></canvas>
        <div class="lib-viewer-hint" id="lib-hint">← Select a part to preview</div>
      </div>
      <div class="lib-detail" id="lib-detail"><p class="lib-empty">Select a part from the list to see specs and 3D preview.</p></div>
    </div>
  </div>
</div>

<script>
// ── Three.js setup ──────────────────────────────────────────────────────────

const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.setClearColor(0x0a1628);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 500);
camera.position.set(12, 10, 18);

const controls = new THREE.OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);

// Grid
const grid = new THREE.GridHelper(40, 40, 0x1a4a80, 0x0f3460);
scene.add(grid);

// Axes helper (toggleable)
let axesHelper = new THREE.AxesHelper(5);
axesHelper.visible = false;
scene.add(axesHelper);

// Assembly group
let assemblyGroup = new THREE.Group();
scene.add(assemblyGroup);

function toggleAxes() { axesHelper.visible = !axesHelper.visible; }

function resetCamera() {
  camera.position.set(12, 10, 18);
  controls.target.set(0, 0, 0);
  controls.update();
}

function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// ── Animation system ────────────────────────────────────────────────────────

let isPlaying = false;
let animGears = [];   // [{mesh, axisKey, omega}]  omega in rad/s (normalized)
let animRack = null;  // {mesh, axisKey, linearSpeed, t, range, originPos}
const ANIM_SPEED = 1.5;  // global speed multiplier (visual)
let lastFrameTime = null;

function buildGearOmegas(gearPairs) {
  if (!gearPairs || !gearPairs.length) return {};
  const adj = {};
  for (const pair of gearPairs) {
    if (!adj[pair.gear1]) adj[pair.gear1] = [];
    if (!adj[pair.gear2]) adj[pair.gear2] = [];
    // Opposite rotation for meshing gears
    adj[pair.gear1].push({ id: pair.gear2, ratio: -(pair.teeth1 / pair.teeth2) });
    adj[pair.gear2].push({ id: pair.gear1, ratio: -(pair.teeth2 / pair.teeth1) });
  }
  const omegas = {};
  const start = gearPairs[0].gear1;
  omegas[start] = 1.0;
  const queue = [start];
  const visited = new Set([start]);
  while (queue.length) {
    const cur = queue.shift();
    for (const { id, ratio } of (adj[cur] || [])) {
      if (!visited.has(id)) {
        visited.add(id);
        omegas[id] = omegas[cur] * ratio;
        queue.push(id);
      }
    }
  }
  return omegas;
}

function startAnimation(assembly, kinematics) {
  animGears = [];
  animRack = null;
  const gearPairs = kinematics.gear_pairs || [];
  if (!gearPairs.length && !kinematics.rack_pinion?.length) return;

  const omegas = buildGearOmegas(gearPairs);

  for (const [partId, omega] of Object.entries(omegas)) {
    const mesh = partMeshes[partId];
    if (!mesh) continue;
    const part = (assembly.parts || []).find(p => p.id === partId);
    // Always animate around local 'y' — gears are cylinders along Y before applyAxis tilts them
    animGears.push({ mesh, axisKey: 'y', omega });
  }

  if (kinematics.rack_pinion?.length) {
    const rp = kinematics.rack_pinion[0];
    const mesh = partMeshes[rp.rack];
    if (mesh) {
      const pinionOmega = omegas[rp.gear] || 1.0;
      const pinionPart = (assembly.parts || []).find(p => p.id === rp.gear);
      const pinionSpec = PARTS_DATA[pinionPart?.type];
      const radius = pinionSpec?.radius_studs || 1;
      const rackPart = (assembly.parts || []).find(p => p.id === rp.rack);
      const axisKey = rackPart?.axis || 'x';
      animRack = {
        mesh,
        axisKey,
        linearSpeed: Math.abs(pinionOmega) * radius,
        t: 0,
        range: 1.5,
        originPos: mesh.position.clone(),
      };
    }
  }

  if (animGears.length || animRack) {
    isPlaying = true;
    document.getElementById('btn-play').textContent = '⏹ Stop';
  }
}

function stopAnimation() {
  isPlaying = false;
  animGears = [];
  animRack = null;
  lastFrameTime = null;
  const btn = document.getElementById('btn-play');
  if (btn) btn.textContent = '▶ Play';
}

function togglePlay() {
  if (isPlaying) { stopAnimation(); } else { isPlaying = true; document.getElementById('btn-play').textContent = '⏹ Stop'; }
}

function animate(t) {
  requestAnimationFrame(animate);
  controls.update();

  if (isPlaying && lastFrameTime !== null) {
    const dt = Math.min((t - lastFrameTime) / 1000, 0.05) * ANIM_SPEED;
    for (const ag of animGears) {
      ag.mesh.rotation[ag.axisKey] += ag.omega * dt;
    }
    if (animRack) {
      animRack.t += dt * animRack.linearSpeed;
      const offset = Math.sin(animRack.t) * animRack.range;
      const ax = animRack.axisKey;
      animRack.mesh.position[ax] = animRack.originPos[ax] + offset;
    }
  }
  lastFrameTime = t;

  renderer.render(scene, camera);
}
animate();

// ── Part colors ────────────────────────────────────────────────────────────

const CAT_COLORS = {
  gear:      0xd4a843,
  axle:      0x888888,
  beam:      0x7eb8e8,
  rack:      0xe87722,
  pin:       0x444444,
  connector: 0xaaaaaa,
  motor:     0xe94560,
};

function hexColor(cat) {
  return CAT_COLORS[cat] || 0xffffff;
}

// ── Build 3D mesh for a part ────────────────────────────────────────────────

function buildPartMesh(part, spec) {
  const cat = spec.category;
  const color = hexColor(cat);
  const mat = new THREE.MeshPhongMaterial({ color, shininess: 60 });
  let mesh;

  // Axis rotation helpers
  function applyAxis(obj, axis) {
    if (axis === 'x') {
      obj.rotation.z = Math.PI / 2;
    } else if (axis === 'z') {
      obj.rotation.x = Math.PI / 2;
    }
    // y is default for cylinders
  }

  if (cat === 'gear') {
    const r = spec.radius_studs || 1;
    const isWorm = spec.teeth === 1;
    if (isWorm) {
      // Worm: elongated cylinder with helix rings
      const group = new THREE.Group();
      const bodyGeo = new THREE.CylinderGeometry(0.28, 0.28, 2.4, 16);
      group.add(new THREE.Mesh(bodyGeo, mat));
      const threadMat = new THREE.MeshPhongMaterial({ color: 0xb8902a, shininess: 80 });
      for (let i = 0; i < 5; i++) {
        const t = new THREE.TorusGeometry(0.32, 0.07, 8, 16);
        const tm = new THREE.Mesh(t, threadMat);
        tm.position.y = -0.96 + i * 0.48;
        group.add(tm);
      }
      // Axle hole
      const holeMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
      group.add(new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 2.6, 8), holeMat));
      mesh = group;
    } else {
      // Spur gear: main disk + individual teeth + hub + axle hole
      const group = new THREE.Group();
      const darkMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
      const hubMat  = new THREE.MeshPhongMaterial({ color: 0xb8902a, shininess: 80 });

      // Main disk (slightly inset from teeth)
      const diskGeo = new THREE.CylinderGeometry(r - 0.14, r - 0.14, 0.52, 48);
      group.add(new THREE.Mesh(diskGeo, mat));

      // Individual tooth blocks around circumference
      const toothCount = spec.teeth;
      const toothW = (2 * Math.PI * r) / toothCount * 0.55; // ~55% duty cycle
      const toothH = 0.28;
      const toothD = 0.42;
      for (let i = 0; i < toothCount; i++) {
        const angle = (i / toothCount) * Math.PI * 2;
        const toothGeo = new THREE.BoxGeometry(toothW, toothD, toothH);
        const tooth = new THREE.Mesh(toothGeo, hubMat);
        tooth.position.set(
          Math.cos(angle) * (r - 0.04),
          0,
          Math.sin(angle) * (r - 0.04)
        );
        tooth.rotation.y = -angle;
        group.add(tooth);
      }

      // Hub circle (raised center)
      const hubGeo = new THREE.CylinderGeometry(r * 0.35, r * 0.35, 0.65, 16);
      group.add(new THREE.Mesh(hubGeo, hubMat));

      // Axle hole
      const holeGeo = new THREE.CylinderGeometry(0.18, 0.18, 0.75, 8);
      group.add(new THREE.Mesh(holeGeo, darkMat));

      mesh = group;
    }
    applyAxis(mesh, part.axis || 'y');

  } else if (cat === 'axle') {
    const L = spec.length || 3;
    const geo = new THREE.CylinderGeometry(0.18, 0.18, L, 8);
    mesh = new THREE.Mesh(geo, mat);
    // Offset so pos is one end
    mesh.position.y = L / 2;
    const wrapper = new THREE.Group();
    wrapper.add(mesh);
    mesh = wrapper;
    applyAxis(mesh, part.axis || 'y');

  } else if (cat === 'beam') {
    const L = spec.length || 5;
    const geo = new THREE.BoxGeometry(L, 0.45, 0.45);
    mesh = new THREE.Mesh(geo, mat);
    // Holes along beam
    const holeMat = new THREE.MeshPhongMaterial({ color: 0x0a1628 });
    for (let i = 0; i < L; i++) {
      const h = new THREE.CylinderGeometry(0.16, 0.16, 0.6, 8);
      const hm = new THREE.Mesh(h, holeMat);
      hm.position.set(i - (L - 1) / 2, 0, 0);
      hm.rotation.z = Math.PI / 2;
      mesh.add(hm);
    }
    // Offset so pos is at hole 0 end
    mesh.position.x = (L - 1) / 2;
    const wrapper = new THREE.Group();
    wrapper.add(mesh);
    mesh = wrapper;

    // Apply axis rotation
    const axis = part.axis || 'x';
    if (axis === 'y') { mesh.rotation.z = Math.PI / 2; }
    else if (axis === 'z') { mesh.rotation.y = Math.PI / 2; }

  } else if (cat === 'rack') {
    const L = spec.length || 4;
    const geo = new THREE.BoxGeometry(L, 0.3, 0.55);
    mesh = new THREE.Mesh(geo, mat);
    // Tooth bumps on top
    const toothMat = new THREE.MeshPhongMaterial({ color: 0xc86010 });
    for (let i = 0; i < L * 2; i++) {
      const tg = new THREE.BoxGeometry(0.22, 0.18, 0.55);
      const tm = new THREE.Mesh(tg, toothMat);
      tm.position.set(i * 0.5 - L / 2 + 0.25, 0.24, 0);
      mesh.add(tm);
    }
    mesh.position.x = L / 2;
    const wrapper = new THREE.Group();
    wrapper.add(mesh);
    mesh = wrapper;

    const axis = part.axis || 'x';
    if (axis === 'y') { mesh.rotation.z = Math.PI / 2; }
    else if (axis === 'z') { mesh.rotation.y = Math.PI / 2; }

  } else if (cat === 'pin') {
    const geo = new THREE.CylinderGeometry(0.2, 0.2, 2, 8);
    mesh = new THREE.Mesh(geo, mat);
    applyAxis(mesh, part.axis || 'y');

  } else if (cat === 'connector') {
    const geo = new THREE.CylinderGeometry(0.35, 0.35, 0.8, 8);
    mesh = new THREE.Mesh(geo, mat);
    applyAxis(mesh, part.axis || 'y');

  } else if (cat === 'motor') {
    const L = spec.length || 3;
    const group = new THREE.Group();
    // Motor body — slightly taller box
    const bodyGeo = new THREE.BoxGeometry(L, 1.2, 1.2);
    const bodyMat = new THREE.MeshPhongMaterial({ color: 0xe94560, shininess: 60 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.x = (L - 1) / 2;
    group.add(body);
    // Label stripe
    const stripeMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
    const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.21, 1.21), stripeMat);
    stripe.position.x = (L - 1) / 2 - L / 2 + 0.5;
    group.add(stripe);
    // Output axle stub
    const axleMat = new THREE.MeshPhongMaterial({ color: 0x888888 });
    const axleGeo = new THREE.CylinderGeometry(0.18, 0.18, 1.2, 8);
    const axleStub = new THREE.Mesh(axleGeo, axleMat);
    axleStub.rotation.z = Math.PI / 2;
    axleStub.position.x = (L - 1) / 2 + L / 2 + 0.5;
    group.add(axleStub);
    mesh = group;
    const axis = part.axis || 'x';
    if (axis === 'y') { mesh.rotation.z = Math.PI / 2; }
    else if (axis === 'z') { mesh.rotation.y = Math.PI / 2; }

  } else {
    const geo = new THREE.SphereGeometry(0.3, 8, 8);
    mesh = new THREE.Mesh(geo, mat);
  }

  return mesh;
}

// ── Render assembly ─────────────────────────────────────────────────────────

let partsLib = {};
let partMeshes = {};  // partId -> mesh (for animation)

async function renderAssembly(assembly) {
  // Clear existing
  while (assemblyGroup.children.length) {
    assemblyGroup.remove(assemblyGroup.children[0]);
  }
  partMeshes = {};
  stopAnimation();

  const parts = assembly.parts || [];
  const bounds = { min: [Infinity,Infinity,Infinity], max: [-Infinity,-Infinity,-Infinity] };

  for (const part of parts) {
    const spec = partsLib[part.type];
    if (!spec) continue;

    // Try LDraw geometry first; fall back to hand-crafted mesh
    const partColor = hexColor(spec.category);
    let mesh = await _loadLDraw(part.type, partColor);
    if (!mesh) mesh = buildPartMesh(part, spec);

    const pos = part.pos || [0, 0, 0];
    mesh.position.set(pos[0], pos[1], pos[2]);
    mesh.userData = { partId: part.id, partType: part.type };
    assemblyGroup.add(mesh);
    partMeshes[part.id] = mesh;

    bounds.min = bounds.min.map((v, i) => Math.min(v, pos[i]));
    bounds.max = bounds.max.map((v, i) => Math.max(v, pos[i]));
  }

  // Center camera on assembly
  if (parts.length > 0 && bounds.min[0] < Infinity) {
    const cx = (bounds.min[0] + bounds.max[0]) / 2;
    const cy = (bounds.min[1] + bounds.max[1]) / 2;
    const cz = (bounds.min[2] + bounds.max[2]) / 2;
    controls.target.set(cx, cy, cz);

    const span = Math.max(...bounds.max.map((v, i) => v - bounds.min[i]));
    const dist = Math.max(span * 1.8, 8);
    camera.position.set(cx + dist * 0.6, cy + dist * 0.5, cz + dist * 0.8);
    controls.update();
  }
}

// ── Compile ─────────────────────────────────────────────────────────────────

const PHYSICS_SERVER = 'http://localhost:8765/physics';

async function compileAssembly() {
  let assembly;
  try {
    assembly = JSON.parse(document.getElementById('assembly-editor').value);
  } catch(e) {
    showResults({ ok: false, errors: ['Invalid JSON: ' + e.message], warnings: [], connections: [], kinematics: {} });
    switchTab('results');
    return;
  }

  renderAssembly(assembly);

  // Try Python physics server first; fall back to JS kinematics if not running
  let data;
  try {
    const resp = await fetch(PHYSICS_SERVER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(assembly),
      signal: AbortSignal.timeout(3000),
    });
    const serverResult = await resp.json();
    // Merge server result into the local compile result (which has connections etc.)
    const local = compileLocal(assembly);
    data = {
      ...local,
      ok: serverResult.validation_errors.length === 0,
      errors: serverResult.validation_errors,
      warnings: [...(local.warnings || []), ...(serverResult.validation_warnings || [])],
      kinematics: serverResult.kinematics,
      physics_source: 'python',
    };
  } catch(e) {
    // Server not running — use JS kinematics
    data = compileLocal(assembly);
    data.physics_source = 'js';
  }

  showResults(data);
  switchTab('results');

  if (data.ok && data.kinematics) {
    startAnimation(assembly, data.kinematics);
  }
}

      </div>
      <div class="stat-box">
        <div class="stat-val">${data.part_count || 0}</div>
        <div class="stat-label">Parts</div>

  if (data.kinematics && data.kinematics.gear_pairs && data.kinematics.gear_pairs.length) {
    const ratio = data.kinematics.gear_pairs[0].ratio;
    html += `
      <div class="stat-box">
        <div class="stat-val">${ratio.toFixed(2)}×</div>
        <div class="stat-label">Gear Ratio</div>
      </div>`;
  }
  if (data.kinematics && data.kinematics.rack_pinion && data.kinematics.rack_pinion.length) {
    html += `
      <div class="stat-box">
        <div class="stat-val">↔</div>
        <div class="stat-label">Rack+Pinion</div>
      </div>`;
  }
  html += `</div></div>`;

  // Errors
  if (data.errors && data.errors.length) {
    html += `<div class="result-section"><h3>Errors</h3>`;
    data.errors.forEach(e => {
      html += `<div class="check-item check-err"><span class="check-icon">✗</span><div class="check-msg">${e}</div></div>`;
    });
    html += `</div>`;
  }

  // Connections
  if (data.connections && data.connections.length) {
    html += `<div class="result-section"><h3>Connections</h3>`;
    data.connections.forEach(c => {
      const cls = c.ok ? 'check-ok' : 'check-err';
      const icon = c.ok ? '✓' : '✗';
      html += `<div class="check-item ${cls}">
        <span class="check-icon">${icon}</span>
        <div class="check-msg">
          <strong>${c.type}</strong><br>${c.msg}
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  // Kinematics
  if (data.kinematics) {
    const k = data.kinematics;
    if (k.gear_pairs && k.gear_pairs.length) {
      html += `<div class="result-section"><h3>Kinematics</h3>`;
      k.gear_pairs.forEach(gp => {
        html += `<div class="check-item check-ok">
          <span class="check-icon">⚙</span>
          <div class="check-msg">${gp.gear1} (${gp.teeth1}T) ↔ ${gp.gear2} (${gp.teeth2}T)<br>
          ratio = ${gp.teeth2}/${gp.teeth1} = <strong>${gp.ratio.toFixed(3)}:1</strong></div>
        </div>`;
      });
      html += `</div>`;
    }
    if (k.rack_pinion && k.rack_pinion.length) {
      html += `<div class="result-section">`;
      k.rack_pinion.forEach(rp => {
        html += `<div class="check-item check-ok">
          <span class="check-icon">↔</span>
          <div class="check-msg">${rp.note}</div>
        </div>`;
      });
      html += `</div>`;
    }
  }

  // Motor power output
  if (data.kinematics && data.kinematics.motor_output) {
    const mo = data.kinematics.motor_output;
    html += `<div class="result-section"><h3>Motor Output</h3>
      <div class="stat-grid">
        <div class="stat-box">
          <div class="stat-val">${mo.output_rpm.toFixed(0)}</div>
          <div class="stat-label">RPM out</div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${mo.output_torque_ncm.toFixed(1)}</div>
          <div class="stat-label">Torque (Ncm)</div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${mo.gear_ratio.toFixed(2)}×</div>
          <div class="stat-label">Gear ratio</div>
        </div>
      </div>
      <div class="check-item check-ok" style="margin-top:8px;background:#0a2040">
        <span class="check-icon">⚡</span>
        <div class="check-msg" style="font-size:11px">${mo.note}</div>
      </div>
    </div>`;
  }

  // BBox
  if (data.bbox) {
    const s = data.bbox.size;
    html += `<div class="result-section"><h3>Bounding Box</h3>
      <div class="check-item check-ok" style="background:#0a2040">
        <span class="check-icon">□</span>
        <div class="check-msg">${s[0].toFixed(1)} × ${s[1].toFixed(1)} × ${s[2].toFixed(1)} studs</div>
      </div></div>`;
  }

  // Physics source badge
  const src = data.physics_source || 'js';
  html += `<div style="margin-top:12px;font-size:10px;color:#555;text-align:right">
    physics: <span style="color:${src==='python'?'#4caf50':'#888'}">${src==='python'?'● python (physics.py)':'○ js (fallback)'}</span>
  </div>`;

  if (!html) html = '<p style="color:#888;padding:20px">No results.</p>';
  el.innerHTML = html;
}

// ── AI Generation ─────────────────────────────────────────────────────────

const MODAL_AGENT_URL = 'https://maksym-d-bondarenko--lego-mechanic-agent-fastapi-app.modal.run';

async function generateAssembly() {
  const prompt = document.getElementById('prompt-input').value.trim();
  if (!prompt) return;

  const btn = document.getElementById('btn-generate');
  btn.disabled = true;
  btn.textContent = '⏳ Generating...';

  switchTab('results');
  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = '<div class="agent-log" id="agent-log"></div>';
  const log = document.getElementById('agent-log');

  function addEntry(cls, html) {
    const div = document.createElement('div');
    div.className = `agent-entry ${cls}`;
    div.innerHTML = html;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    return div;
  }

  let thinkingEl = null;
  addEntry('agent-tool', '<span class="spinner">⟳</span> Sending to Claude...');

  try {
    const resp = await fetch(MODAL_AGENT_URL + '/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt }),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const chunks = buffer.split('\n\n');
      buffer = chunks.pop();

      for (const chunk of chunks) {
        if (!chunk.startsWith('data: ')) continue;
        let ev;
        try { ev = JSON.parse(chunk.slice(6)); } catch { continue; }

        if (ev.type === 'thinking') {
          if (!thinkingEl) {
            // Remove the "Sending to Claude..." entry
            const entries = log.querySelectorAll('.agent-entry');
            if (entries.length === 1) entries[0].remove();
            thinkingEl = addEntry('agent-thinking', '');
          }
          thinkingEl.textContent = (thinkingEl.textContent + ev.text).slice(-400);
          log.scrollTop = log.scrollHeight;

        } else if (ev.type === 'tool_call') {
          thinkingEl = null;
          addEntry('agent-tool', `<span class="spinner">⟳</span> Round ${ev.round}: validating assembly...`);

        } else if (ev.type === 'validation') {
          // Replace last spinner
          const last = log.querySelector('.agent-entry:last-child');
          if (last && last.innerHTML.includes('⟳')) last.remove();
          if (ev.valid) {
            addEntry('agent-valid', `✓ Round ${ev.round}: Assembly valid!`);
          } else {
            let html = `✗ Round ${ev.round}: ${ev.errors.length} error(s)`;
            ev.errors.slice(0, 3).forEach(e => { html += `<div style="margin-top:3px;font-size:11px;opacity:.85">→ ${e}</div>`; });
            addEntry('agent-error-entry', html);
          }

        } else if (ev.type === 'done') {
          thinkingEl = null;
          addEntry('agent-done', `✓ Done in ${ev.rounds} round(s) — loading assembly...`);
          const assemblyStr = JSON.stringify(ev.assembly, null, 2);
          document.getElementById('assembly-editor').value = assemblyStr;
          renderAssembly(ev.assembly);
          setTimeout(() => {
            const d = compileLocal(ev.assembly);
            showResults(d);
            if (d.ok && d.kinematics) startAnimation(ev.assembly, d.kinematics);
          }, 900);

        } else if (ev.type === 'error') {
          addEntry('agent-error-entry', `✗ ${ev.message}`);
        }
      }
    }
  } catch (err) {
    addEntry('agent-error-entry', `✗ Connection failed: ${err.message}<br><small>Is the Modal endpoint deployed?</small>`);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generate ✦';
  }
}

async function loadTasks() {
  const tasks = TASKS_DATA;
  const el = document.getElementById('tasks-list');

  let currentTier = null;
  tasks.forEach(t => {
    if (t.tier !== currentTier) {
      currentTier = t.tier;
      const tierLabels = ['', 'Structural', 'Single Mechanism', 'Mechanism Reasoning', 'Constrained Design', 'Open Design'];
      el.innerHTML += `<div class="tier-label">Tier ${t.tier} — ${tierLabels[t.tier]}</div>`;
    }
    const div = document.createElement('div');
    div.className = 'task-item';
    div.innerHTML = `
      <div class="task-header">
        <span class="task-id">${t.id}</span>
        <span class="task-name">${t.name}</span>
      </div>
      <div class="task-prompt">${t.prompt.slice(0, 120)}…</div>`;
    div.onclick = () => loadTask(t);
    el.appendChild(div);
  });
}

function loadTask(task) {
  const template = {
    reasoning: `Task ${task.id}: ${task.name}. TODO: fill in your design.`,
    parts: [],
    connections: []
  };
  document.getElementById('assembly-editor').value = JSON.stringify(template, null, 2);
  switchTab('editor');
}

function _initLDraw() {
  if (typeof THREE.LDrawLoader === 'undefined') return;
  _ldrawLoader = new THREE.LDrawLoader();
  _ldrawLoader.setPartsLibraryPath(LDRAW_BASE);
  _ldrawAvailable = true;
}

function _applyColor(group, hexInt) {
  group.traverse(child => {
    if (!child.isMesh) return;
    const mats = Array.isArray(child.material) ? child.material : [child.material];
    mats.forEach(m => { if (m) { m = m.clone(); m.color.setHex(hexInt); child.material = m; } });
  });
}

// Returns a cloned, colored, scaled group — or null if not available
function _loadLDraw(partType, hexColor) {
  if (!_ldrawAvailable || !LDRAW_MAPPING[partType]) return Promise.resolve(null);
  if (_ldrawCache[partType]) {
    const g = _ldrawCache[partType].clone();
    _applyColor(g, hexColor);
    return Promise.resolve(g);
  }
  const url = LDRAW_BASE + 'parts/' + LDRAW_MAPPING[partType];
  return new Promise(resolve => {
    _ldrawLoader.load(url, group => {
      group.scale.setScalar(LDRAW_SCALE);
      _ldrawCache[partType] = group;
      const g = group.clone();
      _applyColor(g, hexColor);
      resolve(g);
    }, undefined, err => {
      console.warn('LDraw load failed:', partType, err);
      resolve(null);
    });
  });
}

// ── Client-side validation (ported from Python) ─────────────────────────────

function dist3(a, b) {
  return Math.sqrt(a.reduce((s, v, i) => s + Math.pow(v - b[i], 2), 0));
}

function distPerp(point, origin, axis) {
  const [px, py, pz] = point, [ox, oy, oz] = origin;
  if (axis === 'x') return Math.sqrt(Math.pow(py-oy,2) + Math.pow(pz-oz,2));
  if (axis === 'y') return Math.sqrt(Math.pow(px-ox,2) + Math.pow(pz-oz,2));
  return Math.sqrt(Math.pow(px-ox,2) + Math.pow(py-oy,2));
}

function validateAssembly(assembly, lib) {
  const errors = [], warnings = [];
  const parts = assembly.parts || [];
  if (!parts.length) { errors.push('Assembly has no parts.'); return {errors, warnings}; }
  const seen = new Set();
  for (const p of parts) {
    if (!p.id) { errors.push('A part is missing an id field.'); continue; }
    if (seen.has(p.id)) { errors.push(`Duplicate part ID: '${p.id}'`); continue; }
    seen.add(p.id);
    if (!p.type) { errors.push(`Part '${p.id}': missing type.`); continue; }
    if (!lib[p.type]) { errors.push(`Part '${p.id}': unknown type '${p.type}'.`); continue; }
    if (!Array.isArray(p.pos) || p.pos.length !== 3) { errors.push(`Part '${p.id}': pos must be [x,y,z].`); continue; }
    if (!['x','y','z'].includes(p.axis || 'y')) { errors.push(`Part '${p.id}': axis must be x, y, or z.`); continue; }
  }
  return {errors, warnings};
}

function computeKinematics(assembly, lib) {
  const parts = assembly.parts || [], result = {};
  const gears = [], racks = [], motors = [];
  for (const p of parts) {
    if (!lib[p.type]) continue;
    const spec = lib[p.type];
    if (spec.category === 'gear')
      gears.push({id:p.id, teeth:spec.teeth, radius:spec.radius_studs, pos:p.pos, axis:p.axis||'y'});
    else if (spec.category === 'rack')
      racks.push({id:p.id, pos:p.pos, axis:p.axis||'x'});
    else if (spec.category === 'motor')
      motors.push({id:p.id, type:p.type, rpm_no_load:spec.rpm_no_load, stall_torque_ncm:spec.stall_torque_ncm, rated_power_w:spec.rated_power_w});
  }
  if (motors.length) result.motors = motors;
  const gearPairs = [];
  for (let i = 0; i < gears.length; i++) {
    for (let j = i+1; j < gears.length; j++) {
      const g1=gears[i], g2=gears[j];
      if (g1.axis !== g2.axis) continue;
      const d = dist3(g1.pos, g2.pos), exp = g1.radius + g2.radius;
      if (Math.abs(d - exp) < 0.75) {
        const ratio = Math.round(g2.teeth/g1.teeth * 1000)/1000;
        gearPairs.push({gear1:g1.id, gear2:g2.id, teeth1:g1.teeth, teeth2:g2.teeth, ratio});
      }
    }
  }
  if (gearPairs.length) result.gear_pairs = gearPairs;
  const rackPinion = [];
  for (const rack of racks) for (const gear of gears) {
    const d = distPerp(gear.pos, rack.pos, rack.axis);
    if (Math.abs(d - gear.radius) < 0.75)
      rackPinion.push({gear:gear.id, rack:rack.id, note:`Gear '${gear.id}' (${gear.teeth}T) drives rack '${rack.id}' → rotation→linear`});
  }
  if (rackPinion.length) { result.rack_pinion = rackPinion; result.motion_type = 'Rotational → Linear'; }

  // Motor power computation
  if (motors.length && gearPairs.length) {
    const motor = motors[0];
    const totalRatio = computeChainRatio(gearPairs);
    result.motor_output = {
      motor_id: motor.id,
      gear_ratio: Math.round(totalRatio * 100) / 100,
      output_rpm: Math.round(motor.rpm_no_load / totalRatio * 10) / 10,
      output_torque_ncm: Math.round(motor.stall_torque_ncm * totalRatio * 0.85 * 10) / 10,
      note: `${motor.rpm_no_load} RPM ÷ ${totalRatio.toFixed(2)} = ${(motor.rpm_no_load/totalRatio).toFixed(1)} RPM out, torque × ${totalRatio.toFixed(2)} × 0.85 = ${(motor.stall_torque_ncm * totalRatio * 0.85).toFixed(1)} Ncm`,
    };
  } else if (motors.length && !gearPairs.length) {
    const motor = motors[0];
    result.motor_output = {
      motor_id: motor.id,
      gear_ratio: 1.0,
      output_rpm: motor.rpm_no_load,
      output_torque_ncm: motor.stall_torque_ncm * 0.85,
      note: `Direct drive: ${motor.rpm_no_load} RPM, ${(motor.stall_torque_ncm * 0.85).toFixed(1)} Ncm`,
    };
  }

  return result;
}

function computeChainRatio(gearPairs) {
  if (!gearPairs.length) return 1.0;
  if (gearPairs.length === 1) return gearPairs[0].ratio;
  // BFS to find longest chain from endpoint to endpoint
  const adj = {};
  for (const p of gearPairs) {
    if (!adj[p.gear1]) adj[p.gear1] = [];
    if (!adj[p.gear2]) adj[p.gear2] = [];
    adj[p.gear1].push({id: p.gear2, r: p.ratio});
    adj[p.gear2].push({id: p.gear1, r: 1/p.ratio});
  }
  // Degree map to find endpoints
  const deg = {};
  for (const p of gearPairs) {
    deg[p.gear1] = (deg[p.gear1]||0)+1;
    deg[p.gear2] = (deg[p.gear2]||0)+1;
  }
  const endpoints = Object.entries(deg).filter(([,d])=>d===1).map(([id])=>id);
  if (endpoints.length < 2) {
    // Loop or single pair — just multiply all ratios > 1
    return gearPairs.reduce((acc, p) => p.ratio > 1 ? acc * p.ratio : acc, 1.0);
  }
  // DFS from first endpoint
  let best = 1.0, bestLen = 0;
  function dfs(node, visited, cur, depth) {
    if (depth > bestLen) { bestLen = depth; best = cur; }
    for (const {id, r} of (adj[node]||[])) {
      if (!visited.has(id)) { dfs(id, new Set([...visited, id]), cur*r, depth+1); }
    }
  }
  dfs(endpoints[0], new Set([endpoints[0]]), 1.0, 0);
  return Math.round(best * 10000) / 10000;
}

function checkConnectionsLocal(assembly, lib) {
  const partsMap = {};
  for (const p of (assembly.parts||[])) partsMap[p.id] = p;
  function getSpec(id) { const p=partsMap[id]; return p&&lib[p.type] ? [lib[p.type],p] : [null,null]; }
  const results = [];
  for (const conn of (assembly.connections||[])) {
    const ctype = conn.type||'?';
    let ok=false, msg='';
    if (ctype === 'gear_mesh') {
      const [a_id,b_id] = conn.parts||[];
      const [sa,pa]=getSpec(a_id), [sb,pb]=getSpec(b_id);
      if (!sa||!sb) { msg='Part not found'; }
      else if (sa.category!=='gear'||sb.category!=='gear') { msg='Both must be gears'; }
      else {
        const exp=sa.radius_studs+sb.radius_studs, actual=dist3(pa.pos,pb.pos);
        const isWorm=sa.teeth===1||sb.teeth===1;
        if (isWorm && pa.axis===pb.axis) msg=`Worm: axes must be perpendicular (both '${pa.axis}')`;
        else if (!isWorm && pa.axis!==pb.axis) msg=`Spur: axes must match ('${pa.axis}' vs '${pb.axis}')`;
        else if (Math.abs(actual-exp)>0.75) msg=`Distance ${actual.toFixed(2)} studs, need ${exp} (r1+r2). Move ${b_id} ${(exp-actual).toFixed(1)} studs.`;
        else { ok=true; const ratio=sb.teeth/sa.teeth; msg=`${a_id}(${sa.teeth}T) ↔ ${b_id}(${sb.teeth}T)  dist=${actual.toFixed(2)}/${exp}  ratio=${ratio.toFixed(2)}:1`; }
      }
    } else if (ctype==='rack_pinion') {
      const [sg,pg]=getSpec(conn.gear), [sr,pr]=getSpec(conn.rack);
      if (!sg||!sr) msg='Part not found';
      else { const gr=sg.radius_studs, d=distPerp(pg.pos,pr.pos,pr.axis||'x');
        if (Math.abs(d-gr)>0.6) msg=`Gear is ${d.toFixed(2)} studs from rack, need ${gr}.`;
        else { ok=true; msg=`Gear ${conn.gear} (${sg.teeth}T) drives rack ${conn.rack}  → rotation→linear`; } }
    } else if (ctype==='axle_through') {
      const [sax,pax]=getSpec(conn.axle), [,ppt]=getSpec(conn.part);
      if (!sax||!ppt) msg='Part not found';
      else { const d=distPerp(ppt.pos,pax.pos,pax.axis||'y');
        if (d>0.6) msg=`Axle misses part by ${d.toFixed(2)} studs.`;
        else { ok=true; msg=`Axle '${conn.axle}' → '${conn.part}'  ✓`; } }
    } else if (ctype==='bush_on_axle') {
      const [sax,pax]=getSpec(conn.axle), [,pb]=getSpec(conn.bush);
      if (!sax||!pb) msg='Part not found';
      else { const d=distPerp(pb.pos,pax.pos,pax.axis||'y');
        if (d>0.6) msg=`Bush not on axle (d=${d.toFixed(2)})`;
        else { ok=true; msg=`Bush '${conn.bush}' on axle '${conn.axle}' ✓`; } }
    } else if (ctype==='pin_in_beam') {
      const [sb]=getSpec(conn.beam);
      if (!sb) msg=`Beam ${conn.beam} not found`;
      else if (!(sb.holes||[]).includes(conn.hole)) msg=`Beam has no hole at ${conn.hole}`;
      else { ok=true; msg=`Pin in beam '${conn.beam}' hole ${conn.hole} ✓`; }
    } else msg=`Unknown connection type '${ctype}'`;
    results.push({type:ctype, ok, msg, raw:conn});
  }
  return results;
}

function compileLocal(assembly) {
  const {errors, warnings} = validateAssembly(assembly, PARTS_DATA);
  const kinematics = errors.length ? {} : computeKinematics(assembly, PARTS_DATA);
  const connections = checkConnectionsLocal(assembly, PARTS_DATA);
  const parts = assembly.parts || [];
  let bbox = null;
  if (parts.length) {
    const xs=parts.filter(p=>p.pos).map(p=>p.pos[0]);
    const ys=parts.filter(p=>p.pos).map(p=>p.pos[1]);
    const zs=parts.filter(p=>p.pos).map(p=>p.pos[2]);
    bbox={min:[Math.min(...xs),Math.min(...ys),Math.min(...zs)],
           max:[Math.max(...xs),Math.max(...ys),Math.max(...zs)],
           size:[Math.max(...xs)-Math.min(...xs),Math.max(...ys)-Math.min(...ys),Math.max(...zs)-Math.min(...zs)]};
  }
  return {ok:!errors.length, errors, warnings, kinematics, connections, bbox, part_count:parts.length};
}

let activeGalleryId = 'rack-pinion';

function buildGallery() {
  const strip = document.getElementById('gallery-strip');
  GALLERY.forEach(g => {
    const card = document.createElement('div');
    card.className = 'gallery-card' + (g.id === activeGalleryId ? ' active' : '');
    card.id = 'card-' + g.id;
    card.innerHTML = `
      <div class="gallery-card-title">${g.title}</div>
      <div class="gallery-card-sub">${g.sub}</div>
      <span class="gallery-card-tag tag-${g.tag}">${g.tagLabel}</span>`;
    card.onclick = () => loadGallery(g.id);
    strip.appendChild(card);
  });
}

function loadGallery(id) {
  const g = GALLERY.find(x => x.id === id);
  if (!g) return;
  activeGalleryId = id;
  document.querySelectorAll('.gallery-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('card-' + id);
  if (card) card.classList.add('active');
  document.getElementById('assembly-editor').value = JSON.stringify(g.assembly, null, 2);
  compileAssembly();
  switchTab('results');
}

    {"id": "pinion",   "type": "gear-8t", "pos": [2,0,1],  "axis": "y"},
    {"id": "axle",     "type": "axle-5",  "pos": [2,-2,1], "axis": "y"},
    {"id": "frame_f",  "type": "beam-5",  "pos": [0,-2,0], "axis": "x"},
    {"id": "frame_b",  "type": "beam-5",  "pos": [0,-2,2], "axis": "x"},
    {"id": "post_l",   "type": "beam-3",  "pos": [0,-2,0], "axis": "z"},
    {"id": "post_r",   "type": "beam-3",  "pos": [4,-2,0], "axis": "z"},
    {"id": "bush_bot", "type": "bush",    "pos": [2,-2,1], "axis": "y"},
    {"id": "bush_top", "type": "bush",    "pos": [2,1,1],  "axis": "y"}
  ],
  "connections": [
    {"type": "rack_pinion",  "gear": "pinion",  "rack": "rack"},
    {"type": "axle_through", "axle": "axle",    "part": "pinion"},
    {"type": "bush_on_axle", "axle": "axle",    "bush": "bush_bot"},
    {"type": "bush_on_axle", "axle": "axle",    "bush": "bush_top"},
    {"type": "pin_in_beam",  "beam": "frame_f", "hole": 2, "part": "post_l"},
    {"type": "pin_in_beam",  "beam": "frame_b", "hole": 2, "part": "post_r"}
  ]
};

buildGallery();
loadParts();
loadTasks();

// ── Page navigation ──────────────────────────────────────────────────────────

function switchPage(page, partId, pushState) {
  const isLib = page === 'library';
  document.getElementById('page-studio').style.display = isLib ? 'none' : 'flex';
  document.getElementById('page-library').style.display = isLib ? 'flex' : 'none';
  document.getElementById('nav-studio').classList.toggle('active', !isLib);
  document.getElementById('nav-library').classList.toggle('active', isLib);
  if (isLib) {
    if (!libRenderer) initLibViewer();
    buildLibraryGrid();
    libAnimating = true;
    animateLib();
    if (partId) showLibraryPart(partId);
  } else {
    libAnimating = false;
  }
  if (pushState !== false) {
    const url = isLib ? (partId ? `/library/${partId}` : '/library') : '/';
    history.pushState({ page, partId }, '', url);
  }
}

// ── Library viewer ───────────────────────────────────────────────────────────

let libRenderer = null, libScene = null, libCamera = null, libControls = null;
let libAnimating = false;
let libPartGroup = null;

function initLibViewer() {
  const canvas = document.getElementById('lib-canvas');
  libRenderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  libRenderer.setPixelRatio(window.devicePixelRatio);
  libRenderer.setClearColor(0x0a1628);

  libScene = new THREE.Scene();
  libCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
  libCamera.position.set(5, 4, 7);

  libControls = new THREE.OrbitControls(libCamera, canvas);
  libControls.enableDamping = true;
  libControls.dampingFactor = 0.08;

  libScene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dl = new THREE.DirectionalLight(0xffffff, 0.8);
  dl.position.set(5, 10, 5);
  libScene.add(dl);
  libScene.add(new THREE.GridHelper(10, 10, 0x1a4a80, 0x0f3460));
  libPartGroup = new THREE.Group();
  libScene.add(libPartGroup);
}

function animateLib() {
  if (!libAnimating) return;
  requestAnimationFrame(animateLib);
  libControls.update();
  const canvas = document.getElementById('lib-canvas');
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (w > 0 && h > 0) {
    libRenderer.setSize(w, h, false);
    libCamera.aspect = w / h;
    libCamera.updateProjectionMatrix();
  }
  libRenderer.render(libScene, libCamera);
}

async function showLibraryPart(type, pushState) {
  if (!libRenderer) initLibViewer();
  const spec = partsLib[type];
  if (!spec) return;

  // Clear previous part
  while (libPartGroup.children.length) libPartGroup.remove(libPartGroup.children[0]);

  const part = { id: 'preview', type, pos: [0, 0, 0], axis: 'y' };
  const partColor = hexColor(spec.category);
  let mesh = await _loadLDraw(type, partColor);
  if (!mesh) mesh = buildPartMesh(part, spec);
  libPartGroup.add(mesh);

  // Auto-fit camera
  const box = new THREE.Box3().setFromObject(libPartGroup);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3()).length();
  libCamera.position.copy(center).add(new THREE.Vector3(size, size * 0.8, size * 1.2));
  libControls.target.copy(center);
  libControls.update();

  document.getElementById('lib-hint').style.display = 'none';

  // Update detail panel
  const rows = [];
  if (spec.teeth != null)         rows.push({ k: 'Teeth', v: spec.teeth });
  if (spec.radius_studs != null)  rows.push({ k: 'Radius (studs)', v: spec.radius_studs });
  if (spec.length != null)        rows.push({ k: 'Length (studs)', v: spec.length });
  if (spec.holes)                 rows.push({ k: 'Holes', v: spec.holes.length });
  if (spec.bl_id)                 rows.push({ k: 'BL ID', v: spec.bl_id });
  rows.push({ k: 'Category', v: spec.category });

  document.getElementById('lib-detail').innerHTML = `
    <h3>${spec.name}</h3>
    <div class="lib-detail-grid">
      ${rows.map(r => `<div class="lib-spec-box"><div class="lib-spec-key">${r.k}</div><div class="lib-spec-val">${r.v}</div></div>`).join('')}
    </div>
    <p style="font-size:12px;color:#888;margin-top:10px">${spec.description || ''}</p>
  `;

  // Highlight active card
  document.querySelectorAll('.lib-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('lib-card-' + type.replace(/[^a-z0-9]/g, '-'));
  if (card) { card.classList.add('active'); card.scrollIntoView({ block: 'nearest' }); }
}

// ── Build library grid ────────────────────────────────────────────────────────

function buildLibraryGrid(filter) {
  const grid = document.getElementById('lib-grid');
  const categories = {};
  for (const [type, spec] of Object.entries(partsLib)) {
    if (filter && !spec.name.toLowerCase().includes(filter) && !type.includes(filter)) continue;
    if (!categories[spec.category]) categories[spec.category] = [];
    categories[spec.category].push([type, spec]);
  }
  grid.innerHTML = '';
  for (const [cat, parts] of Object.entries(categories)) {
    const label = document.createElement('div');
    label.className = 'lib-cat-label';
    label.textContent = cat;
    grid.appendChild(label);
    for (const [type, spec] of parts) {
      const card = document.createElement('div');
      card.className = 'lib-card';
      card.id = 'lib-card-' + type.replace(/[^a-z0-9]/g, '-');
      const meta = [];
      if (spec.teeth != null) meta.push(`${spec.teeth}T`);
      if (spec.length != null) meta.push(`L=${spec.length}`);
      if (spec.radius_studs != null) meta.push(`r=${spec.radius_studs}`);
      card.innerHTML = `
        <div class="lib-card-name">${type}</div>
        <div class="lib-card-meta">${spec.name}</div>
        ${meta.length ? `<div class="lib-card-spec">${meta.join(' · ')}</div>` : ''}
      `;
      card.onclick = () => { history.pushState({ page: 'library', partId: type }, '', `/library/${type}`); showLibraryPart(type, false); };
      grid.appendChild(card);
    }
  }
}

function filterLibrary() {
  const q = document.getElementById('lib-search-input').value.toLowerCase().trim();
  buildLibraryGrid(q || null);
}

// ── Router ────────────────────────────────────────────────────────────────────

function route(path) {
  const m = path.match(/^\/library\/?([^/]*)$/);
  if (m) {
    switchPage('library', m[1] || null, false);
  } else {
    switchPage('studio', null, false);
  }
}

window.addEventListener('popstate', e => {
  route(window.location.pathname);
});

// Load first gallery item on start
window.addEventListener('load', () => {
  _initLDraw();
  route(window.location.pathname);
  if (window.location.pathname === '/' || window.location.pathname === '/studio') {
    setTimeout(() => loadGallery('rack-pinion'), 300);
  }
});
</script>
